<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Biscuit International — Schoonmaak Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bi-navy:      #16213a;
  --bi-navy-mid:  #1e2d50;
  --bi-gold:      #c9a227;
  --bi-gold-lt:   #ddb83a;
  --bi-gold-dim:  rgba(201,162,39,0.18);
  --bi-cream:     #f5f0e6;
  --bg:    #f4f1eb;
  --white: #ffffff;
  --card:  #fffffe;
  --ink:   #1a1814;
  --ink2:  #3d3830;
  --ink3:  #7a7268;
  --ink4:  #b0a89e;
  --border:#e6e2da;
  --green: #16a34a;
  --amber: #d97706;
  --red:   #dc2626;
  --brand: #2563eb;
  --mon:#dbeafe; --mon-dk:#2563eb;
  --tue:#dcfce7; --tue-dk:#16a34a;
  --wed:#fef3c7; --wed-dk:#d97706;
  --thu:#fce7f3; --thu-dk:#db2777;
  --fri:#ede9fe; --fri-dk:#7c3aed;
  --sat:#ffedd5; --sat-dk:#ea580c;
  --sun:#f0fdf4; --sun-dk:#15803d;
  --sans:'Outfit',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --radius:14px;
  --shadow:0 2px 12px rgba(26,24,20,0.08);
  --shadow-lg:0 8px 32px rgba(26,24,20,0.14);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;}

/* TOPBAR */
.topbar{background:var(--bi-navy);height:60px;display:flex;align-items:center;gap:12px;padding:0 20px;flex-shrink:0;border-bottom:2px solid rgba(201,162,39,0.4);position:relative;}

/* BI Logo image */
.bi-logo-img{height:38px;width:auto;object-fit:contain;filter:brightness(0) invert(1);flex-shrink:0;}

.brand-divider{width:1px;height:28px;background:rgba(201,162,39,0.3);margin:0 4px;flex-shrink:0;}
.dash-label{font-size:0.7rem;font-weight:600;color:rgba(245,240,230,0.5);letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap;}

.week-pill{background:var(--bi-gold-dim);color:var(--bi-gold);font-family:var(--mono);font-size:0.72rem;font-weight:600;padding:4px 12px;border-radius:20px;border:1px solid rgba(201,162,39,0.3);white-space:nowrap;}
.spacer{flex:1;}
.clock{font-family:var(--mono);font-size:0.85rem;color:rgba(245,240,230,0.4);}

.top-select{background:rgba(255,255,255,0.07);color:var(--bi-cream);border:1px solid rgba(201,162,39,0.22);border-radius:8px;padding:6px 12px;font-family:var(--sans);font-size:0.8rem;font-weight:500;cursor:pointer;outline:none;transition:all 0.2s;min-width:150px;}
.top-select:hover{background:rgba(201,162,39,0.12);border-color:rgba(201,162,39,0.45);}
.top-select option{background:var(--bi-navy-mid);color:var(--bi-cream);}

.badge-btn{display:flex;align-items:center;gap:6px;background:var(--bi-gold);color:var(--bi-navy);border:none;border-radius:8px;padding:7px 14px;font-family:var(--sans);font-size:0.8rem;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.badge-btn:hover{background:var(--bi-gold-lt);}
.badge-btn.active{background:var(--green);color:white;}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100vh;}
.content{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:16px;}

/* SECTION TITLE */
.sec-title{font-size:0.7rem;font-weight:700;color:var(--bi-gold);text-transform:uppercase;letter-spacing:0.12em;display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sec-title::after{content:'';flex:1;height:1px;background:rgba(201,162,39,0.2);}

/* DAILY GRID */
.daily-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.day-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;}
.day-header{padding:8px 10px 6px;text-align:center;font-weight:700;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;border-bottom:1px solid var(--border);}
.day-card.day-mon .day-header{background:var(--mon);color:var(--mon-dk);}
.day-card.day-tue .day-header{background:var(--tue);color:var(--tue-dk);}
.day-card.day-wed .day-header{background:var(--wed);color:var(--wed-dk);}
.day-card.day-thu .day-header{background:var(--thu);color:var(--thu-dk);}
.day-card.day-fri .day-header{background:var(--fri);color:var(--fri-dk);}
.day-card.day-sat .day-header{background:var(--sat);color:var(--sat-dk);}
.day-card.day-sun .day-header{background:var(--sun);color:var(--sun-dk);}
.day-card.today{outline:2px solid var(--bi-gold);outline-offset:-1px;}
.day-tasks{flex:1;padding:6px;}
.day-task{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:6px;margin-bottom:3px;cursor:pointer;transition:background 0.15s;font-size:0.75rem;}
.day-task:hover{background:var(--bg);}
.day-task.done{opacity:0.5;}
.day-task.done .task-text{text-decoration:line-through;color:var(--ink4);}
.day-task.rejected{background:#fef2f2;}
.task-check{width:16px;height:16px;border-radius:4px;flex-shrink:0;border:1.5px solid var(--border);background:white;display:flex;align-items:center;justify-content:center;font-size:0.6rem;cursor:pointer;transition:all 0.15s;}
.task-check.done{background:var(--green);border-color:var(--green);color:white;}
.task-check.rejected{background:var(--red);border-color:var(--red);color:white;}
.task-text{flex:1;line-height:1.3;}
.task-mine{width:4px;height:4px;border-radius:50%;background:var(--bi-gold);flex-shrink:0;}
.day-footer{padding:6px 10px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(201,162,39,0.03);}
.ring-wrap{display:flex;align-items:center;gap:6px;}
.ring{position:relative;width:32px;height:32px;flex-shrink:0;}
.ring svg{transform:rotate(-90deg);}
.ring .pct-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--mono);font-size:0.55rem;font-weight:700;color:var(--ink);line-height:1;text-align:center;}
.day-count{font-size:0.68rem;color:var(--ink4);font-family:var(--mono);}

/* TABLE */
.task-table-wrap{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);}
.task-table{width:100%;border-collapse:collapse;}
.task-table th{padding:8px 10px;text-align:center;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink3);background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap;}
.task-table th.task-col{text-align:left;min-width:160px;}
.task-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
.task-table tr:last-child td{border-bottom:none;}
.task-table tr:hover td{background:#faf9f5;}
.task-name-cell{font-size:0.8rem;font-weight:500;color:var(--ink);display:flex;align-items:center;gap:6px;}
.task-name-cell.done-name{text-decoration:line-through;color:var(--ink4);}
.mine-dot{width:5px;height:5px;border-radius:50%;background:var(--bi-gold);flex-shrink:0;}
.check-cell{text-align:center;}
.check-x{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;cursor:pointer;font-size:0.8rem;transition:all 0.15s;border:1.5px solid transparent;}
.check-x.empty{border-color:var(--border);color:transparent;}
.check-x.empty:hover{border-color:var(--green);color:var(--green);background:var(--bg);}
.check-x.done{background:var(--green);color:white;border-color:var(--green);}
.check-x.rejected{background:var(--red);color:white;border-color:var(--red);}
.check-x.inactive{color:var(--border);background:var(--bg);cursor:default;}

/* PROGRESS */
.progress-section{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px;box-shadow:var(--shadow);}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.prog-row:last-child{margin-bottom:0;}
.prog-label{font-size:0.75rem;color:var(--ink2);width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prog-bar{flex:1;height:7px;background:var(--border);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width 0.5s;}
.prog-pct{font-family:var(--mono);font-size:0.68rem;color:var(--ink3);width:30px;text-align:right;flex-shrink:0;}

/* POPUP */
.popup-overlay{position:fixed;inset:0;background:rgba(22,33,58,0.65);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.popup-overlay.active{opacity:1;pointer-events:all;}
.popup-card{background:var(--card);border-radius:18px;padding:2rem;width:400px;max-width:92vw;box-shadow:var(--shadow-lg);transform:scale(0.94);transition:transform 0.2s;border:1px solid rgba(201,162,39,0.2);}
.popup-overlay.active .popup-card{transform:scale(1);}
.popup-icon{font-size:2rem;text-align:center;display:block;margin-bottom:0.8rem;}
.popup-title{font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:0.3rem;color:var(--bi-navy);}
.popup-sub{font-size:0.82rem;color:var(--ink3);text-align:center;margin-bottom:1.2rem;}
.popup-task-name{background:var(--bg);border-radius:8px;padding:8px 12px;font-size:0.85rem;font-weight:600;margin-bottom:1.2rem;text-align:center;border-left:3px solid var(--bi-gold);}
.popup-badge-input{width:100%;padding:0.9rem;font-size:1.4rem;text-align:center;font-family:var(--mono);font-weight:600;letter-spacing:0.2em;border:2px solid var(--border);border-radius:10px;outline:none;background:var(--bg);transition:all 0.2s;margin-bottom:0.5rem;}
.popup-badge-input:focus{border-color:var(--bi-gold);background:white;}
.popup-status{font-size:0.78rem;min-height:20px;text-align:center;font-weight:600;margin-bottom:1rem;}
.popup-status.found{color:var(--green);}
.popup-status.notfound{color:var(--red);}
.popup-btns{display:flex;gap:8px;}
.popup-btn-cancel{flex:1;padding:0.8rem;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:0.88rem;font-weight:600;cursor:pointer;color:var(--ink2);transition:all 0.2s;}
.popup-btn-confirm{flex:1;padding:0.8rem;background:var(--bi-gold);border:none;border-radius:8px;font-family:var(--sans);font-size:0.88rem;font-weight:700;cursor:pointer;color:var(--bi-navy);transition:all 0.2s;}
.popup-btn-confirm:hover{background:var(--bi-gold-lt);}
.popup-btn-confirm:disabled{background:var(--ink4);color:white;cursor:not-allowed;}
.filter-popup-card{background:var(--card);border-radius:18px;padding:2rem;width:360px;max-width:92vw;box-shadow:var(--shadow-lg);transform:scale(0.94);transition:transform 0.2s;text-align:center;border:1px solid rgba(201,162,39,0.2);}
.popup-overlay.active .filter-popup-card{transform:scale(1);}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bi-navy);color:var(--bi-cream);padding:0.7rem 1.5rem;border-radius:30px;font-size:0.82rem;font-weight:600;box-shadow:var(--shadow-lg);transition:transform 0.3s;z-index:2000;border:1px solid rgba(201,162,39,0.3);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--green);border-color:transparent;}
.toast.error{background:var(--red);border-color:transparent;}

/* LOADING */
.loading-state{text-align:center;padding:3rem;color:var(--ink4);}
.spinner{width:28px;height:28px;border:3px solid var(--bi-gold-dim);border-top-color:var(--bi-gold);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:rgba(201,162,39,0.2);border-radius:3px;}

/* RESPONSIVE */
@media(max-width:1024px){.daily-grid{grid-template-columns:repeat(4,1fr);}
.topbar{flex-wrap:wrap;height:auto;padding:10px 16px;gap:8px;}
.top-select{min-width:120px;font-size:0.75rem;}
.task-table th,.task-table td{padding:6px 8px;}}
@media(max-width:640px){body{overflow:auto;}html,body{height:auto;}.app{height:auto;min-height:100vh;}
.content{overflow-y:visible;padding:12px;gap:12px;}
.topbar{flex-wrap:wrap;height:auto;padding:10px 12px;gap:6px;position:sticky;top:0;z-index:100;}
.bi-logo-img{height:28px;}
.clock{display:none;}
.top-select{flex:1;min-width:0;font-size:0.75rem;padding:5px 8px;}
.badge-btn{font-size:0.75rem;padding:6px 10px;}
.daily-grid{grid-template-columns:repeat(7,minmax(120px,1fr));overflow-x:auto;padding-bottom:8px;gap:6px;display:flex;}
.day-card{min-width:120px;flex-shrink:0;}
.task-table-wrap{overflow-x:auto;}.task-table{min-width:600px;}
.popup-card,.filter-popup-card{padding:1.5rem;border-radius:14px;width:95vw;}
.popup-badge-input{font-size:1.2rem;padding:0.8rem;}
.check-x{width:28px;height:28px;font-size:0.9rem;}.task-check{width:18px;height:18px;}}
@media(min-width:1280px){.check-x{width:28px;height:28px;font-size:0.88rem;}.task-check{width:20px;height:20px;}.day-task{padding:6px 8px;font-size:0.78rem;}}

/* ══ KPI HEADER BAR ══ */
.kpi-bar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  flex-shrink: 0;
  height: 72px;
}
.kpi-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  border-right: 1px solid var(--border);
  padding: 8px 12px;
  position: relative;
}
.kpi-item:last-child { border-right: none; }
.kpi-item::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 3px;
  border-radius: 0 0 3px 3px;
}
.kpi-item.kpi-total::before  { background: #64748b; }
.kpi-item.kpi-open::before   { background: #2563eb; }
.kpi-item.kpi-done::before   { background: #16a34a; }
.kpi-item.kpi-review::before { background: #d97706; }
.kpi-item.kpi-nok::before    { background: #dc2626; }

.kpi-ring {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 3.5px solid currentColor;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 0.82rem;
  font-weight: 700;
  flex-shrink: 0;
}
.kpi-item.kpi-total  .kpi-ring { color: #64748b; }
.kpi-item.kpi-open   .kpi-ring { color: #2563eb; }
.kpi-item.kpi-done   .kpi-ring { color: #16a34a; }
.kpi-item.kpi-review .kpi-ring { color: #d97706; }
.kpi-item.kpi-nok    .kpi-ring { color: #dc2626; }

.kpi-label {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink4);
}

/* Week voortgangsbalk */
.week-progress-bar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 20px 10px;
  flex-shrink: 0;
}
.week-prog-label {
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--ink4);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 8px 0 5px;
}
.week-prog-track {
  height: 6px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}
.week-prog-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, #16a34a, #22c55e);
  transition: width 0.6s ease;
}

@media(max-width:640px) {
  .kpi-bar { height: auto; flex-wrap: wrap; }
  .kpi-item { flex: 0 0 33.333%; border-bottom: 1px solid var(--border); }
  .kpi-ring { width: 28px; height: 28px; font-size: 0.72rem; }
  .kpi-label { font-size: 0.55rem; }
  .week-progress-bar { padding: 0 12px 8px; }
}

.day-tasks{flex:1;padding:6px;max-height:280px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.day-tasks::-webkit-scrollbar{width:4px;}.day-tasks::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.task-table-wrap{max-height:340px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.task-table-wrap::-webkit-scrollbar{width:4px;}.task-table-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.task-table thead th{position:sticky;top:0;z-index:2;}
.vrij-header{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);padding:6px 6px 2px;margin-top:4px;border-top:1px dashed var(--border);}
.day-task.vrij{opacity:.55;border-left:2px dashed var(--border);}.day-task.vrij:hover{opacity:.85;background:#f0fdf4;border-left-color:var(--green);}
.vrij-row td{opacity:.5;font-style:italic;}.vrij-row:hover td{opacity:.8;}
.vrij-badge{font-size:.6rem;font-weight:600;padding:1px 6px;border-radius:20px;background:#f0fdf4;color:#15803d;border:1px dashed #86efac;white-space:nowrap;flex-shrink:0;}
.task-assignee{display:inline-flex;align-items:center;gap:3px;font-size:.62rem;font-weight:600;color:#1e40af;background:#dbeafe;border-radius:20px;padding:1px 6px 1px 4px;white-space:nowrap;flex-shrink:0;max-width:90px;overflow:hidden;text-overflow:ellipsis;}
.task-assignee-dot{width:5px;height:5px;border-radius:50%;background:#2563eb;flex-shrink:0;}
tr.is-mine td{background:#eff6ff !important;}tr.is-mine td:first-child{border-left:3px solid #2563eb;}
.day-task.is-mine{background:#eff6ff;border-left:2px solid #2563eb;}.day-task.is-mine:hover{background:#dbeafe;}
.afgerond-btn{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:.75rem;font-weight:600;color:var(--green);margin-top:6px;user-select:none;}
.afgerond-btn:hover{background:#f0fdf4;}.afgerond-btn .arr{font-size:.65rem;transition:transform .2s;}
.afgerond-body{display:none;margin-top:4px;}
.afgerond-count{background:#dcfce7;color:#15803d;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:20px;}
.mini-afgerond-btn{display:flex;align-items:center;gap:5px;cursor:pointer;padding:4px 6px;font-size:.65rem;font-weight:600;color:var(--green);border-top:1px solid var(--border);margin-top:2px;user-select:none;}
.mini-afgerond-btn .arr{font-size:.6rem;transition:transform .2s;}
.mini-afgerond-body{display:none;max-height:120px;overflow-y:auto;}
.kpi-bar{background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:stretch;flex-shrink:0;height:72px;}
.kpi-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border-right:1px solid var(--border);padding:8px 12px;position:relative;}
.kpi-item:last-child{border-right:none;}
.kpi-item::before{content:'';position:absolute;top:0;left:20%;right:20%;height:3px;border-radius:0 0 3px 3px;}
.kpi-item.kpi-total::before{background:#64748b;}.kpi-item.kpi-open::before{background:#2563eb;}
.kpi-item.kpi-done::before{background:#16a34a;}.kpi-item.kpi-review::before{background:#d97706;}.kpi-item.kpi-nok::before{background:#dc2626;}
.kpi-ring{width:36px;height:36px;border-radius:50%;border:3.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:.82rem;font-weight:700;flex-shrink:0;}
.kpi-item.kpi-total .kpi-ring{color:#64748b;}.kpi-item.kpi-open .kpi-ring{color:#2563eb;}
.kpi-item.kpi-done .kpi-ring{color:#16a34a;}.kpi-item.kpi-review .kpi-ring{color:#d97706;}.kpi-item.kpi-nok .kpi-ring{color:#dc2626;}
.kpi-label{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);}
.week-progress-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px 10px;flex-shrink:0;}

<script>
const FLOWS={TAKEN_OPHALEN:'https://default4789560000864d9cb51e4e9372fda1.a9.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/38947ebb16084abab2d4a902c4956c74/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=xKjf_7GnD3wM8X6aQZCzy3NxXuH9X8DFrGTHGRpdVL0',TAAK_AFVINKEN:'https://default4789560000864d9cb51e4e9372fda1.a9.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/fa20299ae9974339b3260dd4ec51e614/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=zf_HRQtv46kpYhalZsB5CrfsSmDV81wlSFt04YF7AYc',BADGE_LOOKUP:'https://default4789560000864d9cb51e4e9372fda1.a9.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/0960a0a199f24d1799dbc81ab236f555/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=Hmt2PPtfCgm27R33OIYUmbl-aw3naJ2QOk4KghTbLVI'};
const DAGEN=['Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag','Zondag'];
const DAG_CLS=['mon','tue','wed','thu','fri','sat','sun'];
const MAANDEN=['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
let state={taken:[],afdelingFilter:'',zoneFilter:'',medewerker:null,pendingId:null};

function weekNr(d){const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));dt.setUTCDate(dt.getUTCDate()+4-(dt.getUTCDay()||7));const y=new Date(Date.UTC(dt.getUTCFullYear(),0,1));return Math.ceil((((dt-y)/86400000)+1)/7);}
function updateClock(){const n=new Date();document.getElementById('clock').textContent=n.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});document.getElementById('week-pill').textContent='Week '+weekNr(n);}
setInterval(updateClock,1000);updateClock();

function toggleAfgerond(id){const b=document.getElementById(id);const btn=document.getElementById('btn-'+id);if(!b||!btn)return;const open=b.style.display==='block';b.style.display=open?'none':'block';const a=btn.querySelector('.arr');if(a)a.style.transform=open?'':'rotate(90deg)';}

async function laadTaken(){
  try{
    const res=await fetch(FLOWS.TAKEN_OPHALEN,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({week:String(weekNr(new Date()))})});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const items=data.taken||data.value||data.items||data.results||(Array.isArray(data)?data:[]);
    function gv(v){return(v&&v.Value)?v.Value:(typeof v==='string'?v:'');}
    state.taken=items.map(item=>({id:item.ID||item.Id,naam:item.Title||'',zone:gv(item.field_3)||'Overig',afdeling:gv(item.Afdeling)||gv(item.field_5)||'',status:gv(item.Status)||'Open',freq:gv(item.field_4)||'Wekelijks',referentie:item.field_2||'',toegewezen:gv(item.Verantwoordelijke)||gv(item.field_7)||gv(item.AssignedTo)||'',uitgevoerdDoor:item.UitgevoerdDoor||''}));
  }catch(e){console.error(e);if(state.taken.length===0){document.getElementById('content').innerHTML='<div class="loading-state">&#9888; Laden mislukt: '+e.message+'</div>';return;}showToast('Herladen mislukt','');}
  vulDropdowns();render();
}

function vulDropdowns(){const afds=[...new Set(state.taken.map(t=>t.afdeling).filter(a=>a))].sort();const s=document.getElementById('afdeling-select');const ha=s.value;while(s.options.length>1)s.remove(1);afds.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;s.appendChild(o);});if(ha)s.value=ha;const bron=state.afdelingFilter?state.taken.filter(t=>t.afdeling===state.afdelingFilter):state.taken;const zones=[...new Set(bron.map(t=>t.zone).filter(z=>z))].sort();const zs=document.getElementById('zone-select');const hz=zs.value;while(zs.options.length>1)zs.remove(1);zones.forEach(z=>{const o=document.createElement('option');o.value=z;o.textContent=z;zs.appendChild(o);});if(hz&&zones.includes(hz))zs.value=hz;}
function filterOpAfdeling(a){state.afdelingFilter=a;state.zoneFilter='';document.getElementById('zone-select').value='';vulDropdowns();render();}
function filterOpZone(z){state.zoneFilter=z;render();}
function gefilterdeTaken(){let t=state.taken;if(state.afdelingFilter)t=t.filter(x=>x.afdeling===state.afdelingFilter);if(state.zoneFilter)t=t.filter(x=>x.zone===state.zoneFilter);return t;}

const FREQ_CONFIG={'Dagelijks':{icon:'&#128197;',label:'Dagelijkse taken',type:'daily',order:1},'2x per dag':{icon:'&#128197;',label:'2x Dagelijkse taken',type:'daily',order:2},'Wekelijks':{icon:'&#128203;',label:'Wekelijkse taken',type:'weekly',order:3},'2-Wekelijks':{icon:'&#128203;',label:'2-Wekelijkse taken',type:'weekly',order:4},'Maandelijks':{icon:'&#128198;',label:'Maandelijkse taken',type:'monthly',order:5},'2-Maandelijks':{icon:'&#128198;',label:'2-Maandelijkse taken',type:'monthly',order:6},'Kwartaal':{icon:'&#128467;',label:'Kwartaaltaken',type:'periodic',order:7},'4-Wekelijks':{icon:'&#128467;',label:'4-Wekelijkse taken',type:'periodic',order:8},'8-Wekelijks':{icon:'&#128467;',label:'8-Wekelijkse taken',type:'periodic',order:9},'Halfjaarlijks':{icon:'&#128197;',label:'Halfjaarlijkse taken',type:'periodic',order:10},'Jaarlijks':{icon:'&#128197;',label:'Jaarlijkse taken',type:'periodic',order:11}};
function gfc(f){return FREQ_CONFIG[f]||{icon:'&#128203;',label:f+' taken',type:'periodic',order:99};}
function isDone(s){return['Uitgevoerd','Goedgekeurd','In Review'].includes(s);}
function isRej(s){return s==='Afgekeurd';}

function taakHtml(t,vrij){
  const d=isDone(t.status),r=isRej(t.status),mine=state.medewerker&&t.toegewezen===state.medewerker.naam;
  const cc=d?'done':r?'rejected':'',ci=d?'\u2713':r?'\u2717':'';
  const hasA=t.toegewezen&&t.toegewezen.trim()!=='';
  let h='<div class="day-task'+(d?' done':'')+(r?' rejected':'')+(mine?' is-mine':'')+(vrij?' vrij':'')+'" onclick="vraagAfvinken('+t.id+')">';
  h+='<div class="task-check '+cc+'" onclick="event.stopPropagation();vraagAfvinken('+t.id+')">'+ci+'</div>';
  h+='<span class="task-text">'+t.naam+'</span>';
  if(vrij)h+='<span class="vrij-badge">vrij</span>';
  else if(hasA)h+='<span class="task-assignee"><span class="task-assignee-dot"></span>'+t.toegewezen.split(' ').map(function(n){return n[0];}).join('').slice(0,3)+'</span>';
  h+='</div>';
  return h;
}

function miniAfgerond(done,uid){
  if(!done.length)return '';
  let h='<div style="padding:4px 6px 2px">';
  h+='<div id="btn-'+uid+'" class="mini-afgerond-btn" data-id="'+uid+'" onclick="toggleAfgerond(this.dataset.id)">';
  h+='<span class="arr">\u25b6</span> Afgerond <span class="afgerond-count">'+done.length+'</span></div>';
  h+='<div id="'+uid+'" class="mini-afgerond-body">';
  done.forEach(function(t){h+='<div style="display:flex;align-items:center;gap:5px;padding:3px 4px;font-size:.7rem;opacity:.6"><span style="color:var(--green)">\u2713</span><span style="text-decoration:line-through;color:var(--ink4)">'+t.naam+'</span></div>';});
  h+='</div></div>';
  return h;
}

function tabelAfgerond(done,uid,cols){
  if(!done.length)return '';
  let h='<div id="btn-'+uid+'" class="afgerond-btn" data-id="'+uid+'" onclick="toggleAfgerond(this.dataset.id)">';
  h+='<span class="arr">\u25b6</span> Afgerond <span class="afgerond-count">'+done.length+'</span></div>';
  h+='<div id="'+uid+'" class="afgerond-body"><div class="task-table-wrap"><table class="task-table"><tbody>';
  done.forEach(function(t){
    h+='<tr style="background:#f0fdf4;opacity:.75"><td><div class="task-name-cell done-name">\u2713 '+t.naam+'</div></td><td style="font-size:.72rem;color:var(--ink3)">'+t.zone+'</td>';
    for(let i=0;i<cols;i++)h+='<td class="check-cell"><span class="check-x done">\u2713</span></td>';
    h+='<td><span style="background:#dcfce7;color:#15803d;padding:2px 8px;border-radius:8px;font-size:.68rem;font-weight:600">\u2713 Klaar</span></td></tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

function renderDailySection(taken,freq){
  const cfg=gfc(freq),di=(new Date().getDay()+6)%7,C=2*Math.PI*11;
  let html='<div><div class="sec-title">'+cfg.icon+' '+cfg.label+'</div><div class="daily-grid">';
  DAGEN.forEach(function(dag,i){
    const isToday=i===di;
    const openT=taken.filter(function(t){return!isDone(t.status);});
    const doneT=taken.filter(function(t){return isDone(t.status);});
    const pct=taken.length>0?Math.round(doneT.length/taken.length*100):0;
    const color=pct===100?'#16a34a':pct>50?'#d97706':'#c9a227';
    const dash=(pct/100)*C;
    const uid='d'+i+freq.replace(/\W/g,'');
    html+='<div class="day-card day-'+DAG_CLS[i]+(isToday?' today':'')+'"><div class="day-header">'+dag.slice(0,2)+(isToday?' \u25cf':'')+'</div><div class="day-tasks">';
    if(state.medewerker){
      const mijn=openT.filter(function(t){return t.toegewezen===state.medewerker.naam;});
      const vrij=openT.filter(function(t){return!t.toegewezen||t.toegewezen.trim()==='';});
      mijn.forEach(function(t){html+=taakHtml(t,false);});
      if(vrij.length){html+='<div class="vrij-header">Vrij te pakken</div>';vrij.forEach(function(t){html+=taakHtml(t,true);});}
    }else{openT.forEach(function(t){html+=taakHtml(t,false);});}
    html+='</div>'+miniAfgerond(doneT,uid);
    html+='<div class="day-footer"><div class="ring-wrap"><div class="ring"><svg width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="11" fill="none" stroke="#e6e2da" stroke-width="4"/><circle cx="16" cy="16" r="11" fill="none" stroke="'+color+'" stroke-width="4" stroke-dasharray="'+dash.toFixed(1)+' '+C.toFixed(1)+'" stroke-linecap="round"/></svg><div class="pct-text">'+pct+'%</div></div></div><div class="day-count">'+doneT.length+'/'+taken.length+'</div></div></div>';
  });
  html+='</div></div>';return html;
}

function weekRij(t,isVrij,dagIdx){
  const d=isDone(t.status),r=isRej(t.status),mine=state.medewerker&&t.toegewezen===state.medewerker.naam;
  const chip=d?'<span style="background:#dcfce7;color:#15803d;padding:2px 8px;border-radius:8px;font-size:.68rem;font-weight:600">\u2713 Klaar</span>':r?'<span style="background:#fee2e2;color:#dc2626;padding:2px 8px;border-radius:8px;font-size:.68rem;font-weight:600">\u2717 Afgekeurd</span>':isVrij?'<span style="background:#f0fdf4;color:#15803d;padding:2px 8px;border-radius:8px;font-size:.68rem;font-weight:600;border:1px dashed #86efac">Vrij</span>':'<span style="background:#dbeafe;color:#2563eb;padding:2px 8px;border-radius:8px;font-size:.68rem;font-weight:600">Open</span>';
  const rc=mine?' is-mine':isVrij?' vrij-row':'';
  const hasA=t.toegewezen&&t.toegewezen.trim()!=='';
  let row='<tr class="'+rc+'"><td><div class="task-name-cell'+(d?' done-name':'')+'">'+( mine?'<div class="mine-dot"></div>':'')+t.naam+(hasA?'<span class="task-assignee" style="margin-left:6px"><span class="task-assignee-dot"></span>'+t.toegewezen+'</span>':'')+'</div></td><td style="font-size:.72rem;color:var(--ink3);white-space:nowrap">'+t.zone+'</td>';
  DAGEN.forEach(function(dx,j){if(d)row+='<td class="check-cell"><span class="check-x done">\u2713</span></td>';else if(r)row+='<td class="check-cell"><span class="check-x rejected">\u2717</span></td>';else if(j===dagIdx)row+='<td class="check-cell"><span class="check-x empty" onclick="vraagAfvinken('+t.id+')">\u2713</span></td>';else row+='<td class="check-cell"><span class="check-x inactive">&middot;</span></td>';});
  row+='<td>'+chip+'</td></tr>';return row;
}

function renderWeeklySection(taken,freq){
  const cfg=gfc(freq),di=(new Date().getDay()+6)%7;
  const openT=taken.filter(function(t){return!isDone(t.status);});
  const doneT=taken.filter(function(t){return isDone(t.status);});
  const nok=taken.filter(function(t){return isRej(t.status);}).length;
  const uid='w'+freq.replace(/\W/g,'');
  let html='<div><div class="sec-title">'+cfg.icon+' '+cfg.label+' <span style="font-size:.65rem;font-weight:400;color:var(--ink4);margin-left:8px;text-transform:none;letter-spacing:0">'+openT.length+' open \u00b7 '+doneT.length+' klaar'+(nok>0?' \u00b7 <span style="color:var(--red)">'+nok+' afgekeurd</span>':'')+' </span></div>';
  html+='<div class="task-table-wrap"><table class="task-table"><thead><tr><th class="task-col">Taaknaam</th><th>Zone</th>';
  DAGEN.forEach(function(d,i){html+='<th style="background:var(--'+DAG_CLS[i]+');color:var(--'+DAG_CLS[i]+'-dk)">'+d.slice(0,2)+'</th>';});
  html+='<th>Status</th></tr></thead><tbody>';
  if(state.medewerker){
    const mijn=openT.filter(function(t){return t.toegewezen===state.medewerker.naam;});
    const vrij=openT.filter(function(t){return!t.toegewezen||t.toegewezen.trim()==='';});
    mijn.forEach(function(t){html+=weekRij(t,false,di);});
    if(vrij.length){html+='<tr><td colspan="'+(DAGEN.length+3)+'" style="padding:4px 10px;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);background:var(--bg);border-top:1px dashed var(--border)">Vrij te pakken</td></tr>';vrij.forEach(function(t){html+=weekRij(t,true,di);});}
  }else{openT.forEach(function(t){html+=weekRij(t,false,di);});}
  html+='</tbody></table></div>'+tabelAfgerond(doneT,uid,DAGEN.length)+'</div>';
  return html;
}

function perRij(t,isVrij,mnd){
  const d=isDone(t.status),r=isRej(t.status),mine=state.medewerker&&t.toegewezen===state.medewerker.naam;
  const chip=d?'<span style="color:var(--green);font-size:.7rem;font-weight:600">\u2713 Klaar</span>':r?'<span style="color:var(--red);font-size:.7rem;font-weight:600">\u2717 Afgekeurd</span>':isVrij?'<span style="background:#f0fdf4;color:#15803d;padding:2px 8px;border-radius:8px;font-size:.68rem;font-weight:600;border:1px dashed #86efac">Vrij</span>':'<span style="color:var(--brand);font-size:.7rem;font-weight:600">Open</span>';
  const rc=mine?' is-mine':isVrij?' vrij-row':'';
  const hasA=t.toegewezen&&t.toegewezen.trim()!=='';
  let row='<tr class="'+rc+'"><td><div class="task-name-cell'+(d?' done-name':'')+'">'+( mine?'<div class="mine-dot"></div>':'')+t.naam+(hasA?'<span class="task-assignee" style="margin-left:6px"><span class="task-assignee-dot"></span>'+t.toegewezen+'</span>':'')+'</div></td><td style="font-size:.72rem;color:var(--ink3)">'+t.zone+'</td>';
  MAANDEN.forEach(function(m,i){if(d)row+='<td class="check-cell"><span class="check-x done">\u2713</span></td>';else if(r)row+='<td class="check-cell"><span class="check-x rejected">\u2717</span></td>';else if(i===mnd)row+='<td class="check-cell"><span class="check-x empty" onclick="vraagAfvinken('+t.id+')">\u2713</span></td>';else row+='<td class="check-cell"><span class="check-x inactive">&middot;</span></td>';});
  row+='<td>'+chip+'</td></tr>';return row;
}

function renderPeriodicSection(taken,freq){
  const cfg=gfc(freq),mnd=new Date().getMonth();
  const openT=taken.filter(function(t){return!isDone(t.status);});
  const doneT=taken.filter(function(t){return isDone(t.status);});
  const uid='p'+freq.replace(/\W/g,'');
  let html='<div><div class="sec-title">'+cfg.icon+' '+cfg.label+' <span style="font-size:.65rem;font-weight:400;color:var(--ink4);margin-left:8px;text-transform:none;letter-spacing:0">'+openT.length+' open \u00b7 '+doneT.length+' klaar</span></div>';
  html+='<div class="task-table-wrap"><table class="task-table"><thead><tr><th class="task-col">Taaknaam</th><th>Zone</th>';
  MAANDEN.forEach(function(m,i){html+='<th style="'+(i===mnd?'background:#fef3c7;color:#d97706':'')+'">' +m+'</th>';});
  html+='<th>Status</th></tr></thead><tbody>';
  if(state.medewerker){
    const mijn=openT.filter(function(t){return t.toegewezen===state.medewerker.naam;});
    const vrij=openT.filter(function(t){return!t.toegewezen||t.toegewezen.trim()==='';});
    mijn.forEach(function(t){html+=perRij(t,false,mnd);});
    if(vrij.length){html+='<tr><td colspan="'+(MAANDEN.length+3)+'" style="padding:4px 10px;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);background:var(--bg);border-top:1px dashed var(--border)">Vrij te pakken</td></tr>';vrij.forEach(function(t){html+=perRij(t,true,mnd);});}
  }else{openT.forEach(function(t){html+=perRij(t,false,mnd);});}
  html+='</tbody></table></div>'+tabelAfgerond(doneT,uid,MAANDEN.length)+'</div>';
  return html;
}

function renderProgressSection(){
  const taken=gefilterdeTaken();
  const zones=[...new Set(taken.map(function(t){return t.zone;}))].sort();
  if(!zones.length)return '';
  let html='<div><div class="sec-title">&#128202; Voortgang per zone</div><div class="progress-section">';
  zones.forEach(function(zone){
    const zt=taken.filter(function(t){return t.zone===zone;});
    const done=zt.filter(function(t){return isDone(t.status);}).length;
    const pct=zt.length>0?Math.round(done/zt.length*100):0;
    const clr=pct===100?'#16a34a':pct>60?'#d97706':'#c9a227';
    html+='<div class="prog-row"><div class="prog-label" title="'+zone+'">'+zone+'</div><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%;background:'+clr+'"></div></div><div class="prog-pct">'+pct+'%</div></div>';
  });
  html+='</div></div>';return html;
}

function updateKpi(){
  const t=gefilterdeTaken();
  const total=t.length,open=t.filter(function(x){return x.status==='Open';}).length;
  const done=t.filter(function(x){return['Uitgevoerd','Goedgekeurd'].includes(x.status);}).length;
  const review=t.filter(function(x){return x.status==='In Review';}).length;
  const nok=t.filter(function(x){return x.status==='Afgekeurd';}).length;
  const pct=total>0?Math.round((done+review)/total*100):0;
  document.getElementById('kpi-total').textContent=total;document.getElementById('kpi-open').textContent=open;
  document.getElementById('kpi-done').textContent=done;document.getElementById('kpi-review').textContent=review;
  document.getElementById('kpi-nok').textContent=nok;document.getElementById('week-prog-fill').style.width=pct+'%';
}

function render(){
  const taken=gefilterdeTaken();
  if(!taken.length){document.getElementById('content').innerHTML='<div class="loading-state">&#128203; Geen taken gevonden.</div>';updateKpi();return;}
  const grp={};
  taken.forEach(function(t){if(!grp[t.freq])grp[t.freq]=[];grp[t.freq].push(t);});
  const sorted=Object.keys(grp).sort(function(a,b){return gfc(a).order-gfc(b).order;});
  let html='';
  sorted.forEach(function(freq){const cfg=gfc(freq);if(cfg.type==='daily')html+=renderDailySection(grp[freq],freq);else if(cfg.type==='weekly')html+=renderWeeklySection(grp[freq],freq);else html+=renderPeriodicSection(grp[freq],freq);});
  html+=renderProgressSection();
  document.getElementById('content').innerHTML=html;
  updateKpi();
}

function openBadgeFilter(){if(state.medewerker){clearBadgeFilter();return;}document.getElementById('filter-badge-input').value='';document.getElementById('filter-status').textContent='';document.getElementById('filter-status').className='popup-status';document.getElementById('popup-filter').classList.add('active');setTimeout(function(){document.getElementById('filter-badge-input').focus();},100);}
function closeFilterPopup(){document.getElementById('popup-filter').classList.remove('active');}
async function doFilterBadge(){const badge=document.getElementById('filter-badge-input').value.trim();const se=document.getElementById('filter-status');if(!badge)return;se.textContent='Opzoeken\u2026';se.className='popup-status';const m=await lookupBadge(badge);if(m){se.textContent='\u2713 '+m.naam;se.className='popup-status found';setTimeout(function(){state.medewerker=m;closeFilterPopup();document.getElementById('badge-btn').classList.add('active');document.getElementById('badge-btn').textContent='\u2713 '+m.naam;render();showToast('Gefilterd op '+m.naam,'success');},600);}else{se.textContent='\u2717 Badge niet herkend';se.className='popup-status notfound';document.getElementById('filter-badge-input').value='';document.getElementById('filter-badge-input').focus();}}
function clearBadgeFilter(){state.medewerker=null;document.getElementById('badge-btn').classList.remove('active');document.getElementById('badge-btn').innerHTML='&#127991; Mijn taken';render();showToast('Filter gewist');}
function vraagAfvinken(id){const t=state.taken.find(function(t){return t.id==id;});if(!t||isDone(t.status))return;state.pendingId=id;document.getElementById('popup-task-name').textContent=t.naam;document.getElementById('popup-badge-input').value='';document.getElementById('popup-status').textContent='';document.getElementById('popup-status').className='popup-status';document.getElementById('popup-confirm').disabled=false;document.getElementById('popup-afvinken').classList.add('active');setTimeout(function(){document.getElementById('popup-badge-input').focus();},100);}
function closeCheckPopup(){document.getElementById('popup-afvinken').classList.remove('active');state.pendingId=null;}
async function verifyCheck(){const badge=document.getElementById('popup-badge-input').value.trim();const se=document.getElementById('popup-status');if(!badge){se.textContent='\u26a0\ufe0f Voer badge in';se.className='popup-status notfound';return;}se.textContent='Opzoeken\u2026';se.className='popup-status';document.getElementById('popup-confirm').disabled=true;const m=await lookupBadge(badge);if(m){se.textContent='\u2713 '+m.naam;se.className='popup-status found';setTimeout(async function(){await doAfvinken(m.naam);},500);}else{se.textContent='\u2717 Badge niet herkend';se.className='popup-status notfound';document.getElementById('popup-badge-input').value='';document.getElementById('popup-badge-input').focus();document.getElementById('popup-confirm').disabled=false;}}
async function doAfvinken(naam){const id=state.pendingId;closeCheckPopup();if(!id)return;const t=state.taken.find(function(t){return t.id==id;});if(!t)return;t.status='Uitgevoerd';t.uitgevoerdDoor=naam;render();showToast('\u2713 Afgetekend door '+naam,'success');const ok=await afvinkenFlow(id,naam);if(!ok){showToast('\u26a0\ufe0f Sync mislukt','error');t.status='Open';t.uitgevoerdDoor='';render();}}
async function lookupBadge(badge){try{const r=await fetch(FLOWS.BADGE_LOOKUP,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({badge})});if(!r.ok)return null;const d=await r.json();if(!d.naam)return null;return{naam:d.naam,zone:d.zone,initials:d.naam.split(' ').map(function(n){return n[0];}).join('').slice(0,2).toUpperCase()};}catch(e){return null;}}
async function afvinkenFlow(id,naam){try{const r=await fetch(FLOWS.TAAK_AFVINKEN,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({taak_id:String(id),medewerker:naam,status:'Uitgevoerd'})});return r.ok||r.status===204;}catch(e){return false;}}
function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'');t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
laadTaken();
setInterval(laadTaken,5*60*1000);

</script>
</body>
