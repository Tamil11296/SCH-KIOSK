<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Biscuit International — Schoonmaak Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Biscuit International Brand ── */
  --bi-navy:       #16213a;
  --bi-navy-mid:   #1e2d50;
  --bi-navy-light: #263660;
  --bi-gold:       #c9a227;
  --bi-gold-lt:    #ddb83a;
  --bi-gold-dim:   rgba(201,162,39,0.18);
  --bi-cream:      #f5f0e6;
  --bi-cream-dim:  rgba(245,240,230,0.07);

  /* ── Page & Cards ── */
  --bg:     #f4f1eb;
  --white:  #ffffff;
  --card:   #fffffe;
  --ink:    #1a1814;
  --ink2:   #3d3830;
  --ink3:   #7a7268;
  --ink4:   #b0a89e;
  --border: #e6e2da;

  /* ── Status ── */
  --green:  #16a34a;
  --amber:  #d97706;
  --red:    #dc2626;
  --brand:  #2563eb;
  --teal:   #0d9488;
  --violet: #7c3aed;

  /* ── Dag pastelkleuren ── */
  --mon: #dbeafe; --mon-dk: #2563eb;
  --tue: #dcfce7; --tue-dk: #16a34a;
  --wed: #fef3c7; --wed-dk: #d97706;
  --thu: #fce7f3; --thu-dk: #db2777;
  --fri: #ede9fe; --fri-dk: #7c3aed;
  --sat: #ffedd5; --sat-dk: #ea580c;
  --sun: #f0fdf4; --sun-dk: #15803d;

  --sans:   'Outfit', sans-serif;
  --mono:   'JetBrains Mono', monospace;
  --radius: 14px;
  --shadow: 0 2px 12px rgba(26,24,20,0.08);
  --shadow-lg: 0 8px 32px rgba(26,24,20,0.14);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--sans); background: var(--bg); color: var(--ink); font-size: 14px; line-height: 1.5; }

/* ══ TOPBAR ══ */
.topbar {
  background: var(--bi-navy);
  height: 60px;
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(201,162,39,0.25);
  position: relative;
}
/* gouden streep onderkant */
.topbar::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--bi-gold) 20%, var(--bi-gold) 80%, transparent);
  opacity: 0.6;
}

/* Logo */
.topbar-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
.bi-wheat { flex-shrink: 0; }
.brand-text { display: flex; flex-direction: column; line-height: 1; }
.brand-name { font-size: 0.88rem; font-weight: 800; color: var(--bi-cream); letter-spacing: 0.12em; text-transform: uppercase; }
.brand-sub  { font-size: 0.56rem; font-weight: 400; color: var(--bi-gold); letter-spacing: 0.28em; text-transform: uppercase; margin-top: 2px; }
.brand-divider { width: 1px; height: 28px; background: rgba(201,162,39,0.25); margin: 0 4px; flex-shrink: 0; }
.dash-label { font-size: 0.7rem; font-weight: 600; color: rgba(245,240,230,0.55); letter-spacing: 0.08em; text-transform: uppercase; }

.week-pill {
  background: var(--bi-gold-dim);
  color: var(--bi-gold);
  font-family: var(--mono); font-size: 0.72rem; font-weight: 600;
  padding: 4px 12px; border-radius: 20px;
  border: 1px solid rgba(201,162,39,0.3);
}
.spacer { flex: 1; }
.clock { font-family: var(--mono); font-size: 0.85rem; color: rgba(245,240,230,0.45); }

/* Dropdowns */
.top-select {
  background: rgba(255,255,255,0.07); color: var(--bi-cream);
  border: 1px solid rgba(201,162,39,0.2); border-radius: 8px;
  padding: 6px 12px; font-family: var(--sans); font-size: 0.8rem; font-weight: 500;
  cursor: pointer; outline: none; transition: all 0.2s; min-width: 150px;
}
.top-select:hover { background: rgba(201,162,39,0.12); border-color: rgba(201,162,39,0.4); }
.top-select option { background: var(--bi-navy-mid); color: var(--bi-cream); }

/* Badge knop */
.badge-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--bi-gold); color: var(--bi-navy); border: none; border-radius: 8px;
  padding: 7px 14px; font-family: var(--sans); font-size: 0.8rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.badge-btn:hover { background: var(--bi-gold-lt); }
.badge-btn.active { background: var(--green); color: white; }

/* ══ MAIN LAYOUT ══ */
.app { display: flex; flex-direction: column; height: 100vh; }
.content { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 16px; }

/* ══ SECTION TITLE ══ */
.sec-title {
  font-size: 0.7rem; font-weight: 700; color: var(--bi-gold);
  text-transform: uppercase; letter-spacing: 0.12em;
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.sec-title::after { content: ''; flex: 1; height: 1px; background: rgba(201,162,39,0.2); }

/* ══ DAILY TASKS GRID ══ */
.daily-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
}
.day-card {
  background: var(--card); border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden;
  box-shadow: var(--shadow);
  display: flex; flex-direction: column;
}
.day-header {
  padding: 8px 10px 6px;
  text-align: center; font-weight: 700; font-size: 0.75rem;
  text-transform: uppercase; letter-spacing: 0.08em;
  border-bottom: 1px solid var(--border);
}
.day-card.day-mon .day-header { background: var(--mon); color: var(--mon-dk); }
.day-card.day-tue .day-header { background: var(--tue); color: var(--tue-dk); }
.day-card.day-wed .day-header { background: var(--wed); color: var(--wed-dk); }
.day-card.day-thu .day-header { background: var(--thu); color: var(--thu-dk); }
.day-card.day-fri .day-header { background: var(--fri); color: var(--fri-dk); }
.day-card.day-sat .day-header { background: var(--sat); color: var(--sat-dk); }
.day-card.day-sun .day-header { background: var(--sun); color: var(--sun-dk); }
.day-card.today { outline: 2px solid var(--bi-gold); outline-offset: -1px; }
.day-card.today .day-header { letter-spacing: 0.06em; }

.day-tasks { flex: 1; padding: 6px; }
.day-task {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 6px; border-radius: 6px; margin-bottom: 3px;
  cursor: pointer; transition: background 0.15s;
  font-size: 0.75rem;
}
.day-task:hover { background: var(--bg); }
.day-task.done { opacity: 0.5; }
.day-task.done .task-text { text-decoration: line-through; color: var(--ink4); }
.day-task.rejected { background: #fef2f2; }

.task-check {
  width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0;
  border: 1.5px solid var(--border); background: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.6rem; cursor: pointer; transition: all 0.15s;
}
.task-check.done     { background: var(--green); border-color: var(--green); color: white; }
.task-check.review   { background: var(--amber); border-color: var(--amber); color: white; }
.task-check.rejected { background: var(--red);   border-color: var(--red);   color: white; }
.task-text { flex: 1; line-height: 1.3; }
.task-mine { width: 4px; height: 4px; border-radius: 50%; background: var(--bi-gold); flex-shrink: 0; }

.day-footer {
  padding: 6px 10px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(201,162,39,0.03);
}
.ring-wrap { display: flex; align-items: center; gap: 6px; }
.ring { position: relative; width: 32px; height: 32px; flex-shrink: 0; }
.ring svg { transform: rotate(-90deg); }
.ring .pct-text {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-family: var(--mono); font-size: 0.55rem; font-weight: 700;
  color: var(--ink); line-height: 1; text-align: center;
}
.day-count { font-size: 0.68rem; color: var(--ink4); font-family: var(--mono); }

/* ══ TABLE ══ */
.task-table-wrap {
  background: var(--card); border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow);
}
.task-table { width: 100%; border-collapse: collapse; }
.task-table th {
  padding: 8px 10px; text-align: center;
  font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--ink3); background: var(--bg); border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.task-table th.task-col { text-align: left; min-width: 160px; }
.task-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.task-table tr:last-child td { border-bottom: none; }
.task-table tr:hover td { background: #faf9f5; }
.task-name-cell { font-size: 0.8rem; font-weight: 500; color: var(--ink); display: flex; align-items: center; gap: 6px; }
.task-name-cell.done-name { text-decoration: line-through; color: var(--ink4); }
.mine-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--bi-gold); flex-shrink: 0; }

.check-cell { text-align: center; }
.check-x {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border-radius: 6px; cursor: pointer;
  font-size: 0.8rem; transition: all 0.15s; border: 1.5px solid transparent;
}
.check-x.empty    { border-color: var(--border); color: transparent; }
.check-x.empty:hover { border-color: var(--green); color: var(--green); background: var(--bg); }
.check-x.done     { background: var(--green); color: white; border-color: var(--green); }
.check-x.review   { background: var(--amber); color: white; border-color: var(--amber); }
.check-x.rejected { background: var(--red);   color: white; border-color: var(--red); }
.check-x.inactive { color: var(--border); background: var(--bg); cursor: default; }

/* ══ TWO COL ══ */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ══ PROGRESS ══ */
.progress-section {
  background: var(--card); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 14px; box-shadow: var(--shadow);
}
.prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.prog-row:last-child { margin-bottom: 0; }
.prog-label { font-size: 0.75rem; color: var(--ink2); width: 100px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prog-bar { flex: 1; height: 7px; background: var(--border); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; transition: width 0.5s; }
.prog-pct { font-family: var(--mono); font-size: 0.68rem; color: var(--ink3); width: 30px; text-align: right; flex-shrink: 0; }

/* ══ POPUP ══ */
.popup-overlay {
  position: fixed; inset: 0; background: rgba(22,33,58,0.65);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.popup-overlay.active { opacity: 1; pointer-events: all; }
.popup-card {
  background: var(--card); border-radius: 18px; padding: 2rem;
  width: 400px; max-width: 92vw; box-shadow: var(--shadow-lg);
  transform: scale(0.94); transition: transform 0.2s;
  border: 1px solid rgba(201,162,39,0.2);
}
.popup-overlay.active .popup-card { transform: scale(1); }
.popup-icon { font-size: 2rem; text-align: center; display: block; margin-bottom: 0.8rem; }
.popup-title { font-size: 1.1rem; font-weight: 700; text-align: center; margin-bottom: 0.3rem; color: var(--bi-navy); }
.popup-sub { font-size: 0.82rem; color: var(--ink3); text-align: center; margin-bottom: 1.2rem; }
.popup-task-name {
  background: var(--bg); border-radius: 8px; padding: 8px 12px;
  font-size: 0.85rem; font-weight: 600; margin-bottom: 1.2rem; text-align: center;
  border-left: 3px solid var(--bi-gold);
}
.popup-badge-input {
  width: 100%; padding: 0.9rem; font-size: 1.4rem; text-align: center;
  font-family: var(--mono); font-weight: 600; letter-spacing: 0.2em;
  border: 2px solid var(--border); border-radius: 10px; outline: none;
  background: var(--bg); transition: all 0.2s; margin-bottom: 0.5rem;
}
.popup-badge-input:focus { border-color: var(--bi-gold); background: white; }
.popup-status { font-size: 0.78rem; min-height: 20px; text-align: center; font-weight: 600; margin-bottom: 1rem; }
.popup-status.found    { color: var(--green); }
.popup-status.notfound { color: var(--red); }
.popup-btns { display: flex; gap: 8px; }
.popup-btn-cancel {
  flex: 1; padding: 0.8rem; background: var(--bg);
  border: 1.5px solid var(--border); border-radius: 8px;
  font-family: var(--sans); font-size: 0.88rem; font-weight: 600;
  cursor: pointer; color: var(--ink2); transition: all 0.2s;
}
.popup-btn-confirm {
  flex: 1; padding: 0.8rem; background: var(--bi-gold);
  border: none; border-radius: 8px;
  font-family: var(--sans); font-size: 0.88rem; font-weight: 700;
  cursor: pointer; color: var(--bi-navy); transition: all 0.2s;
}
.popup-btn-confirm:hover { background: var(--bi-gold-lt); }
.popup-btn-confirm:disabled { background: var(--ink4); color: white; cursor: not-allowed; }

/* Badge filter popup */
.filter-popup-card {
  background: var(--card); border-radius: 18px; padding: 2rem;
  width: 360px; max-width: 92vw; box-shadow: var(--shadow-lg);
  transform: scale(0.94); transition: transform 0.2s; text-align: center;
  border: 1px solid rgba(201,162,39,0.2);
}
.popup-overlay.active .filter-popup-card { transform: scale(1); }

/* ══ TOAST ══ */
.toast {
  position: fixed; bottom: 1.5rem; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--bi-navy); color: var(--bi-cream);
  padding: 0.7rem 1.5rem; border-radius: 30px;
  font-size: 0.82rem; font-weight: 600; box-shadow: var(--shadow-lg);
  transition: transform 0.3s; z-index: 2000;
  border: 1px solid rgba(201,162,39,0.3);
}
.toast.show    { transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--green); border-color: transparent; }
.toast.error   { background: var(--red);   border-color: transparent; }

/* ══ LOADING ══ */
.loading-state { text-align: center; padding: 3rem; color: var(--ink4); }
.spinner {
  width: 28px; height: 28px;
  border: 3px solid var(--bi-gold-dim);
  border-top-color: var(--bi-gold);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: rgba(201,162,39,0.2); border-radius: 3px; }

/* ══ RESPONSIVE ══ */
@media (max-width: 1024px) {
  .daily-grid { grid-template-columns: repeat(4, 1fr); }
  .two-col    { grid-template-columns: 1fr; }
  .topbar     { flex-wrap: wrap; height: auto; padding: 10px 16px; gap: 8px; }
  .top-select { min-width: 120px; font-size: 0.75rem; }
  .task-table th, .task-table td { padding: 6px 8px; }
}
@media (max-width: 640px) {
  body { overflow: auto; }
  html, body { height: auto; }
  .app  { height: auto; min-height: 100vh; }
  .content { overflow-y: visible; padding: 12px; gap: 12px; }
  .topbar { flex-wrap: wrap; height: auto; padding: 10px 12px; gap: 6px; position: sticky; top: 0; z-index: 100; }
  .brand-name  { font-size: 0.78rem; }
  .brand-sub   { display: none; }
  .brand-divider { display: none; }
  .week-pill   { font-size: 0.68rem; padding: 3px 10px; }
  .clock       { display: none; }
  .top-select  { flex: 1; min-width: 0; font-size: 0.75rem; padding: 5px 8px; }
  .badge-btn   { font-size: 0.75rem; padding: 6px 10px; }
  .daily-grid  { grid-template-columns: repeat(7, minmax(120px, 1fr)); overflow-x: auto; padding-bottom: 8px; gap: 6px; display: flex; }
  .day-card    { min-width: 120px; flex-shrink: 0; }
  .day-header  { font-size: 0.7rem; padding: 6px 8px; }
  .day-task    { padding: 4px 5px; font-size: 0.72rem; }
  .task-table-wrap { overflow-x: auto; }
  .task-table  { min-width: 600px; }
  .task-table th { font-size: 0.62rem; padding: 6px; }
  .task-table td { font-size: 0.72rem; padding: 6px; }
  .two-col     { grid-template-columns: 1fr; }
  .progress-section { padding: 10px; }
  .prog-label  { width: 80px; font-size: 0.7rem; }
  .sec-title   { font-size: 0.65rem; }
  .popup-card, .filter-popup-card { padding: 1.5rem; border-radius: 14px; width: 95vw; }
  .popup-badge-input { font-size: 1.2rem; padding: 0.8rem; }
  .popup-title { font-size: 1rem; }
  .check-x     { width: 28px; height: 28px; font-size: 0.9rem; }
  .task-check  { width: 18px; height: 18px; }
}
@media (max-width: 900px) and (orientation: landscape) {
  .daily-grid { grid-template-columns: repeat(7, 1fr); display: grid; }
  .day-card   { min-width: 0; }
  .day-task   { font-size: 0.68rem; padding: 3px 4px; }
}
@media (min-width: 1280px) {
  .check-x    { width: 28px; height: 28px; font-size: 0.88rem; }
  .task-check { width: 20px; height: 20px; }
  .day-task   { padding: 6px 8px; font-size: 0.78rem; }
}
</style>
</head>
<body>

<div class="app">

  <!-- ══ TOPBAR ══ -->
  <div class="topbar">

    <!-- BI Logo + naam -->
    <div class="topbar-brand">
      <!-- Tarwe SVG icon -->
      <svg class="bi-wheat" width="28" height="28" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="30" y1="54" x2="30" y2="10" stroke="#C9A227" stroke-width="2"/>
        <line x1="30" y1="54" x2="17" y2="36" stroke="#C9A227" stroke-width="1.6"/>
        <line x1="30" y1="54" x2="43" y2="36" stroke="#C9A227" stroke-width="1.6"/>
        <ellipse cx="30" cy="9"  rx="4.5" ry="7"   fill="none" stroke="#C9A227" stroke-width="1.6"/>
        <ellipse cx="30" cy="17" rx="4"   ry="6"   fill="none" stroke="#C9A227" stroke-width="1.4"/>
        <ellipse cx="22" cy="26" rx="4"   ry="6.5" fill="none" stroke="#C9A227" stroke-width="1.4" transform="rotate(-28 22 26)"/>
        <ellipse cx="38" cy="26" rx="4"   ry="6.5" fill="none" stroke="#C9A227" stroke-width="1.4" transform="rotate(28 38 26)"/>
        <ellipse cx="17" cy="36" rx="3.5" ry="6"   fill="none" stroke="#C9A227" stroke-width="1.2" transform="rotate(-38 17 36)"/>
        <ellipse cx="43" cy="36" rx="3.5" ry="6"   fill="none" stroke="#C9A227" stroke-width="1.2" transform="rotate(38 43 36)"/>
        <line x1="22" y1="53" x2="38" y2="53" stroke="#C9A227" stroke-width="2"/>
        <line x1="24" y1="56" x2="36" y2="56" stroke="#C9A227" stroke-width="1.2"/>
      </svg>
      <div class="brand-text">
        <span class="brand-name">BISCUIT</span>
        <span class="brand-sub">International</span>
      </div>
    </div>

    <div class="brand-divider"></div>
    <span class="dash-label">Schoonmaak</span>
    <div class="week-pill" id="week-pill">Week —</div>

    <select class="top-select" id="afdeling-select" onchange="filterOpAfdeling(this.value)">
      <option value="">Alle afdelingen</option>
    </select>
    <select class="top-select" id="zone-select" onchange="filterOpZone(this.value)">
      <option value="">Alle zones</option>
    </select>

    <div class="spacer"></div>
    <div class="clock" id="clock">00:00</div>
    <button class="badge-btn" id="badge-btn" onclick="openBadgeFilter()">&#127991; Mijn taken</button>
  </div>

  <!-- ══ CONTENT ══ -->
  <div class="content" id="content">
    <div class="loading-state">
      <div class="spinner"></div>
      <span>Taken worden geladen&hellip;</span>
    </div>
  </div>
</div>

<!-- ══ POPUP AFVINKEN ══ -->
<div class="popup-overlay" id="popup-afvinken">
  <div class="popup-card">
    <span class="popup-icon">&#127991;</span>
    <div class="popup-title">Bevestig met badge</div>
    <div class="popup-sub">Scan je badge om de taak af te tekenen</div>
    <div class="popup-task-name" id="popup-task-name">—</div>
    <input type="password" class="popup-badge-input" id="popup-badge-input"
           placeholder="&#9679; &#9679; &#9679; &#9679; &#9679;" maxlength="20" autocomplete="off"
           onkeydown="if(event.key==='Enter') verifyCheck()">
    <div class="popup-status" id="popup-status"></div>
    <div class="popup-btns">
      <button class="popup-btn-cancel" onclick="closeCheckPopup()">Annuleren</button>
      <button class="popup-btn-confirm" id="popup-confirm" onclick="verifyCheck()">&#10003; Bevestigen</button>
    </div>
  </div>
</div>

<!-- ══ POPUP BADGE FILTER ══ -->
<div class="popup-overlay" id="popup-filter">
  <div class="filter-popup-card">
    <span class="popup-icon">&#127991;</span>
    <div class="popup-title">Scan je badge</div>
    <div class="popup-sub">Filter de lijst op jouw taken</div>
    <input type="password" class="popup-badge-input" id="filter-badge-input"
           placeholder="&#9679; &#9679; &#9679; &#9679; &#9679;" maxlength="20" autocomplete="off"
           onkeydown="if(event.key==='Enter') doFilterBadge()" style="margin-bottom:0.5rem">
    <div class="popup-status" id="filter-status"></div>
    <div class="popup-btns" style="margin-top:0.5rem">
      <button class="popup-btn-cancel" onclick="closeFilterPopup()">Annuleren</button>
      <button class="popup-btn-confirm" onclick="doFilterBadge()">&#128269; Filteren</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──
const FLOWS = {
  TAKEN_OPHALEN: 'https://default4789560000864d9cb51e4e9372fda1.a9.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/38947ebb16084abab2d4a902c4956c74/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=xKjf_7GnD3wM8X6aQZCzy3NxXuH9X8DFrGTHGRpdVL0',
  TAAK_AFVINKEN: 'https://default4789560000864d9cb51e4e9372fda1.a9.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/fa20299ae9974339b3260dd4ec51e614/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=zf_HRQtv46kpYhalZsB5CrfsSmDV81wlSFt04YF7AYc',
  BADGE_LOOKUP:  'https://default4789560000864d9cb51e4e9372fda1.a9.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/0960a0a199f24d1799dbc81ab236f555/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=Hmt2PPtfCgm27R33OIYUmbl-aw3naJ2QOk4KghTbLVI',
};

const DAGEN   = ['Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag','Zondag'];
const DAG_CLS = ['mon','tue','wed','thu','fri','sat','sun'];
const MAANDEN = ['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];

// ── STATE ──
let state = {
  taken: [],
  afdelingFilter: '',
  zoneFilter: '',
  medewerker: null,
  pendingId: null,
};

// ── KLOK ──
function weekNr(d) {
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  dt.setUTCDate(dt.getUTCDate() + 4 - (dt.getUTCDay() || 7));
  const y = new Date(Date.UTC(dt.getUTCFullYear(), 0, 1));
  return Math.ceil((((dt - y) / 86400000) + 1) / 7);
}
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('week-pill').textContent = 'Week ' + weekNr(now);
}
setInterval(updateClock, 1000); updateClock();

// ── LADEN ──
async function laadTaken() {
  try {
    const res = await fetch(FLOWS.TAKEN_OPHALEN, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ week: String(weekNr(new Date())) })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data  = await res.json();
    const items = data.taken || data.value || [];

    state.taken = items.map(item => ({
      id:           item.ID || item.Id,
      naam:         item.Title || '',
      zone:         (item.field_3 && item.field_3.Value) ? item.field_3.Value : (item['Locatie/Ruimte'] || 'Overig'),
      afdeling:     (item.Afdeling && item.Afdeling.Value) ? item.Afdeling.Value : (item.Afdeling || ''),
      status:       (item.Status && item.Status.Value) ? item.Status.Value : (item.Status || 'Open'),
      freq:         (item.Frequentie && item.Frequentie.Value) ? item.Frequentie.Value : (item.Frequentie || 'Wekelijks'),
      referentie:   item.Referentie || '',
      toegewezen:   (item.Verantwoordelijke && item.Verantwoordelijke.Value) ? item.Verantwoordelijke.Value : (item.Verantwoordelijke || ''),
      uitgevoerdDoor: item.UitgevoerdDoor || '',
    }));

    vulDropdowns();
    render();
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="loading-state">\u26a0\ufe0f Fout bij laden: ' + e.message + '</div>';
  }
}

// ── DROPDOWNS ──
function vulDropdowns() {
  const afds   = [...new Set(state.taken.map(t => t.afdeling).filter(a => a))].sort();
  const afdSel = document.getElementById('afdeling-select');
  const huidAfd = afdSel.value;
  while (afdSel.options.length > 1) afdSel.remove(1);
  afds.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; afdSel.appendChild(o); });
  if (huidAfd) afdSel.value = huidAfd;

  const bronTaken = state.afdelingFilter ? state.taken.filter(t => t.afdeling === state.afdelingFilter) : state.taken;
  const zones   = [...new Set(bronTaken.map(t => t.zone).filter(z => z))].sort();
  const zoneSel = document.getElementById('zone-select');
  const huidZone = zoneSel.value;
  while (zoneSel.options.length > 1) zoneSel.remove(1);
  zones.forEach(z => { const o = document.createElement('option'); o.value = z; o.textContent = z; zoneSel.appendChild(o); });
  if (huidZone && zones.includes(huidZone)) zoneSel.value = huidZone;
}
function filterOpAfdeling(afd) {
  state.afdelingFilter = afd; state.zoneFilter = '';
  document.getElementById('zone-select').value = '';
  vulDropdowns(); render();
}
function filterOpZone(zone) { state.zoneFilter = zone; render(); }

// ── FILTER ──
function gefilterdeTaken() {
  let t = state.taken;
  if (state.afdelingFilter) t = t.filter(x => x.afdeling === state.afdelingFilter);
  if (state.zoneFilter)     t = t.filter(x => x.zone     === state.zoneFilter);
  return t;
}

// ── FREQUENTIE CONFIG ──
const FREQ_CONFIG = {
  'Dagelijks':     { icon: '&#128197;', label: 'Dagelijkse taken',     type: 'daily',    order: 1 },
  '2x per dag':    { icon: '&#128197;', label: '2x Dagelijkse taken',  type: 'daily',    order: 2 },
  'Wekelijks':     { icon: '&#128203;', label: 'Wekelijkse taken',     type: 'weekly',   order: 3 },
  '2-Wekelijks':   { icon: '&#128203;', label: '2-Wekelijkse taken',   type: 'weekly',   order: 4 },
  'Maandelijks':   { icon: '&#128198;', label: 'Maandelijkse taken',   type: 'monthly',  order: 5 },
  '2-Maandelijks': { icon: '&#128198;', label: '2-Maandelijkse taken', type: 'monthly',  order: 6 },
  'Kwartaal':      { icon: '&#128467;', label: 'Kwartaaltaken',        type: 'periodic', order: 7 },
  '4-Wekelijks':   { icon: '&#128467;', label: '4-Wekelijkse taken',   type: 'periodic', order: 8 },
  '8-Wekelijks':   { icon: '&#128467;', label: '8-Wekelijkse taken',   type: 'periodic', order: 9 },
  'Halfjaarlijks': { icon: '&#128197;', label: 'Halfjaarlijkse taken', type: 'periodic', order: 10 },
  'Jaarlijks':     { icon: '&#128197;', label: 'Jaarlijkse taken',     type: 'periodic', order: 11 },
};
function getFreqConfig(freq) {
  return FREQ_CONFIG[freq] || { icon: '&#128203;', label: freq + ' taken', type: 'periodic', order: 99 };
}

// ── RENDER DAGELIJKS ──
function renderDailySection(taken, freq) {
  const cfg = getFreqConfig(freq);
  const dagIndex = (new Date().getDay() + 6) % 7;
  const C = 2 * Math.PI * 11;

  let html = '<div><div class="sec-title">' + cfg.icon + ' ' + cfg.label + '</div><div class="daily-grid">';

  DAGEN.forEach((dag, i) => {
    const isToday = i === dagIndex;
    const done  = taken.filter(t => ['Uitgevoerd','Goedgekeurd'].includes(t.status)).length;
    const total = taken.length;
    const pct   = total > 0 ? Math.round(done / total * 100) : 0;
    const color = pct === 100 ? '#16a34a' : pct > 50 ? '#d97706' : '#c9a227';
    const dash  = (pct / 100) * C;

    html += '<div class="day-card day-' + DAG_CLS[i] + (isToday ? ' today' : '') + '">';
    html += '<div class="day-header">' + dag.slice(0, 2) + (isToday ? ' \u25cf' : '') + '</div>';
    html += '<div class="day-tasks">';

    taken.forEach(t => {
      const isDone  = ['Uitgevoerd','Goedgekeurd','In Review'].includes(t.status);
      const isRej   = t.status === 'Afgekeurd';
      const isMine  = state.medewerker && t.toegewezen === state.medewerker.naam;
      const chkCls  = isDone ? 'done' : isRej ? 'rejected' : '';
      const chkIcon = isDone ? '\u2713' : isRej ? '\u2717' : '';
      html += '<div class="day-task ' + (isDone ? 'done' : '') + (isRej ? ' rejected' : '') + '" onclick="vraagAfvinken(' + t.id + ')">';
      html += '<div class="task-check ' + chkCls + '" onclick="event.stopPropagation();vraagAfvinken(' + t.id + ')">' + chkIcon + '</div>';
      html += '<span class="task-text">' + t.naam + '</span>';
      if (isMine) html += '<div class="task-mine"></div>';
      html += '</div>';
    });

    html += '</div>';
    html += '<div class="day-footer">';
    html += '<div class="ring-wrap"><div class="ring">';
    html += '<svg width="32" height="32" viewBox="0 0 32 32">';
    html += '<circle cx="16" cy="16" r="11" fill="none" stroke="#e6e2da" stroke-width="4"/>';
    html += '<circle cx="16" cy="16" r="11" fill="none" stroke="' + color + '" stroke-width="4" stroke-dasharray="' + dash.toFixed(1) + ' ' + C.toFixed(1) + '" stroke-linecap="round"/>';
    html += '</svg>';
    html += '<div class="pct-text">' + pct + '%</div></div></div>';
    html += '<div class="day-count">' + done + '/' + total + '</div>';
    html += '</div></div>';
  });

  html += '</div></div>';
  return html;
}

// ── RENDER WEKELIJKS ──
function renderWeeklySection(taken, freq) {
  const cfg      = getFreqConfig(freq);
  const dagIndex = (new Date().getDay() + 6) % 7;
  const open = taken.filter(t => t.status === 'Open').length;
  const done = taken.filter(t => ['Uitgevoerd','Goedgekeurd'].includes(t.status)).length;
  const nok  = taken.filter(t => t.status === 'Afgekeurd').length;

  let html = '<div><div class="sec-title">' + cfg.icon + ' ' + cfg.label;
  html += ' <span style="font-size:0.65rem;font-weight:400;color:var(--ink4);margin-left:8px;text-transform:none;letter-spacing:0">' +
          open + ' open &middot; ' + done + ' klaar' +
          (nok > 0 ? ' &middot; <span style="color:var(--red)">' + nok + ' afgekeurd</span>' : '') +
          '</span></div>';
  html += '<div class="task-table-wrap"><table class="task-table"><thead><tr>';
  html += '<th class="task-col">Taaknaam</th><th>Zone</th>';
  DAGEN.forEach((d, i) => {
    html += '<th style="background:var(--' + DAG_CLS[i] + ');color:var(--' + DAG_CLS[i] + '-dk)">' + d.slice(0, 2) + '</th>';
  });
  html += '<th>Status</th></tr></thead><tbody>';

  taken.forEach(t => {
    const isDone  = ['Uitgevoerd','Goedgekeurd','In Review'].includes(t.status);
    const isRej   = t.status === 'Afgekeurd';
    const isMine  = state.medewerker && t.toegewezen === state.medewerker.naam;
    const chip    = isDone
      ? '<span style="background:#dcfce7;color:#15803d;padding:2px 8px;border-radius:8px;font-size:0.68rem;font-weight:600">\u2713 Klaar</span>'
      : isRej
      ? '<span style="background:#fee2e2;color:#dc2626;padding:2px 8px;border-radius:8px;font-size:0.68rem;font-weight:600">\u2717 Afgekeurd</span>'
      : '<span style="background:#dbeafe;color:#2563eb;padding:2px 8px;border-radius:8px;font-size:0.68rem;font-weight:600">Open</span>';

    html += '<tr style="' + (isRej ? 'background:#fff8f8' : isDone ? 'background:#f9fdf9' : '') + '">';
    html += '<td><div class="task-name-cell ' + (isDone ? 'done-name' : '') + '">' +
            (isMine ? '<div class="mine-dot"></div>' : '') + t.naam + '</div></td>';
    html += '<td style="font-size:0.72rem;color:var(--ink3);white-space:nowrap">' + t.zone + '</td>';
    DAGEN.forEach((d, i) => {
      if (isDone)        html += '<td class="check-cell"><span class="check-x done">\u2713</span></td>';
      else if (isRej)    html += '<td class="check-cell"><span class="check-x rejected">\u2717</span></td>';
      else if (i === dagIndex) html += '<td class="check-cell"><span class="check-x empty" onclick="vraagAfvinken(' + t.id + ')">\u2713</span></td>';
      else               html += '<td class="check-cell"><span class="check-x inactive">&middot;</span></td>';
    });
    html += '<td>' + chip + '</td></tr>';
  });

  html += '</tbody></table></div></div>';
  return html;
}

// ── RENDER PERIODIEK ──
function renderPeriodicSection(taken, freq) {
  const cfg       = getFreqConfig(freq);
  const huidigMnd = new Date().getMonth();
  const open = taken.filter(t => t.status === 'Open').length;
  const done = taken.filter(t => ['Uitgevoerd','Goedgekeurd'].includes(t.status)).length;

  let html = '<div><div class="sec-title">' + cfg.icon + ' ' + cfg.label;
  html += ' <span style="font-size:0.65rem;font-weight:400;color:var(--ink4);margin-left:8px;text-transform:none;letter-spacing:0">' +
          open + ' open &middot; ' + done + ' klaar</span></div>';
  html += '<div class="task-table-wrap"><table class="task-table"><thead><tr>';
  html += '<th class="task-col">Taaknaam</th><th>Zone</th>';
  MAANDEN.forEach((m, i) => {
    html += '<th style="' + (i === huidigMnd ? 'background:#fef3c7;color:#d97706' : '') + '">' + m + '</th>';
  });
  html += '<th>Status</th></tr></thead><tbody>';

  taken.forEach(t => {
    const isDone = ['Uitgevoerd','Goedgekeurd','In Review'].includes(t.status);
    const isRej  = t.status === 'Afgekeurd';
    const isMine = state.medewerker && t.toegewezen === state.medewerker.naam;

    html += '<tr style="' + (isRej ? 'background:#fff8f8' : isDone ? 'background:#f9fdf9' : '') + '">';
    html += '<td><div class="task-name-cell ' + (isDone ? 'done-name' : '') + '">' +
            (isMine ? '<div class="mine-dot"></div>' : '') + t.naam + '</div></td>';
    html += '<td style="font-size:0.72rem;color:var(--ink3)">' + t.zone + '</td>';
    MAANDEN.forEach((m, i) => {
      if (isDone)         html += '<td class="check-cell"><span class="check-x done">\u2713</span></td>';
      else if (isRej)     html += '<td class="check-cell"><span class="check-x rejected">\u2717</span></td>';
      else if (i === huidigMnd) html += '<td class="check-cell"><span class="check-x empty" onclick="vraagAfvinken(' + t.id + ')">\u2713</span></td>';
      else                html += '<td class="check-cell"><span class="check-x inactive">&middot;</span></td>';
    });
    const chip = isDone
      ? '<span style="color:var(--green);font-size:0.7rem;font-weight:600">\u2713 Klaar</span>'
      : isRej
      ? '<span style="color:var(--red);font-size:0.7rem;font-weight:600">\u2717 Afgekeurd</span>'
      : '<span style="color:var(--brand);font-size:0.7rem;font-weight:600">Open</span>';
    html += '<td>' + chip + '</td></tr>';
  });

  html += '</tbody></table></div></div>';
  return html;
}

// ── RENDER VOORTGANG PER ZONE ──
function renderProgressSection() {
  const taken = gefilterdeTaken();
  const zones = [...new Set(taken.map(t => t.zone))].sort();
  if (zones.length === 0) return '';

  let html = '<div><div class="sec-title">&#128202; Voortgang per zone</div><div class="progress-section">';
  zones.forEach(zone => {
    const zt   = taken.filter(t => t.zone === zone);
    const done = zt.filter(t => ['Uitgevoerd','Goedgekeurd'].includes(t.status)).length;
    const tot  = zt.length;
    const pct  = tot > 0 ? Math.round(done / tot * 100) : 0;
    const clr  = pct === 100 ? '#16a34a' : pct > 60 ? '#d97706' : '#c9a227';
    html += '<div class="prog-row">' +
            '<div class="prog-label" title="' + zone + '">' + zone + '</div>' +
            '<div class="prog-bar"><div class="prog-fill" style="width:' + pct + '%;background:' + clr + '"></div></div>' +
            '<div class="prog-pct">' + pct + '%</div>' +
            '</div>';
  });
  html += '</div></div>';
  return html;
}

// ── HOOFD RENDER ──
function render() {
  const taken = gefilterdeTaken();
  if (taken.length === 0) {
    document.getElementById('content').innerHTML = '<div class="loading-state">&#128203; Geen taken gevonden voor de huidige selectie.</div>';
    return;
  }

  const freqGroepen = {};
  taken.forEach(t => {
    if (!freqGroepen[t.freq]) freqGroepen[t.freq] = [];
    freqGroepen[t.freq].push(t);
  });
  const gesorteerd = Object.keys(freqGroepen).sort((a, b) => getFreqConfig(a).order - getFreqConfig(b).order);

  let html = '';
  gesorteerd.forEach(freq => {
    const groep = freqGroepen[freq];
    const cfg   = getFreqConfig(freq);
    if      (cfg.type === 'daily')  html += renderDailySection(groep, freq);
    else if (cfg.type === 'weekly') html += renderWeeklySection(groep, freq);
    else                            html += renderPeriodicSection(groep, freq);
  });
  html += renderProgressSection();
  document.getElementById('content').innerHTML = html;
}

// ── BADGE FILTER ──
function openBadgeFilter() {
  if (state.medewerker) { clearBadgeFilter(); return; }
  document.getElementById('filter-badge-input').value = '';
  document.getElementById('filter-status').textContent = '';
  document.getElementById('filter-status').className = 'popup-status';
  document.getElementById('popup-filter').classList.add('active');
  setTimeout(() => document.getElementById('filter-badge-input').focus(), 100);
}
function closeFilterPopup() { document.getElementById('popup-filter').classList.remove('active'); }
async function doFilterBadge() {
  const badge    = document.getElementById('filter-badge-input').value.trim();
  const statusEl = document.getElementById('filter-status');
  if (!badge) return;
  statusEl.textContent = 'Opzoeken\u2026'; statusEl.className = 'popup-status';
  const m = await lookupBadge(badge);
  if (m) {
    statusEl.textContent = '\u2713 ' + m.naam; statusEl.className = 'popup-status found';
    setTimeout(() => {
      state.medewerker = m;
      closeFilterPopup();
      document.getElementById('badge-btn').classList.add('active');
      document.getElementById('badge-btn').textContent = '\u2713 ' + m.naam;
      render();
      showToast('Gefilterd op ' + m.naam, 'success');
    }, 600);
  } else {
    statusEl.textContent = '\u2717 Badge niet herkend'; statusEl.className = 'popup-status notfound';
    document.getElementById('filter-badge-input').value = '';
    document.getElementById('filter-badge-input').focus();
  }
}
function clearBadgeFilter() {
  state.medewerker = null;
  document.getElementById('badge-btn').classList.remove('active');
  document.getElementById('badge-btn').innerHTML = '&#127991; Mijn taken';
  render();
  showToast('Filter gewist');
}

// ── AFVINKEN ──
function vraagAfvinken(id) {
  const taak = state.taken.find(t => t.id == id);
  if (!taak) return;
  if (['Uitgevoerd','Goedgekeurd','In Review'].includes(taak.status)) return;
  state.pendingId = id;
  document.getElementById('popup-task-name').textContent = taak.naam;
  document.getElementById('popup-badge-input').value = '';
  document.getElementById('popup-status').textContent = '';
  document.getElementById('popup-status').className = 'popup-status';
  document.getElementById('popup-confirm').disabled = false;
  document.getElementById('popup-afvinken').classList.add('active');
  setTimeout(() => document.getElementById('popup-badge-input').focus(), 100);
}
function closeCheckPopup() {
  document.getElementById('popup-afvinken').classList.remove('active');
  state.pendingId = null;
}
async function verifyCheck() {
  const badge    = document.getElementById('popup-badge-input').value.trim();
  const statusEl = document.getElementById('popup-status');
  if (!badge) { statusEl.textContent = '\u26a0\ufe0f Voer badge in'; statusEl.className = 'popup-status notfound'; return; }
  statusEl.textContent = 'Opzoeken\u2026'; statusEl.className = 'popup-status';
  document.getElementById('popup-confirm').disabled = true;
  const m = await lookupBadge(badge);
  if (m) {
    statusEl.textContent = '\u2713 ' + m.naam; statusEl.className = 'popup-status found';
    setTimeout(async () => { await doAfvinken(m.naam); }, 500);
  } else {
    statusEl.textContent = '\u2717 Badge niet herkend'; statusEl.className = 'popup-status notfound';
    document.getElementById('popup-badge-input').value = '';
    document.getElementById('popup-badge-input').focus();
    document.getElementById('popup-confirm').disabled = false;
  }
}
async function doAfvinken(naam) {
  const id = state.pendingId;
  closeCheckPopup();
  if (!id) return;
  const taak = state.taken.find(t => t.id == id);
  if (!taak) return;
  taak.status = 'Uitgevoerd'; taak.uitgevoerdDoor = naam;
  render();
  showToast('\u2713 Afgetekend door ' + naam, 'success');
  const ok = await afvinkenFlow(id, naam);
  if (!ok) {
    showToast('\u26a0\ufe0f Sync mislukt', 'error');
    taak.status = 'Open'; taak.uitgevoerdDoor = '';
    render();
  }
}

// ── API ──
async function lookupBadge(badge) {
  try {
    const res = await fetch(FLOWS.BADGE_LOOKUP, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ badge })
    });
    if (!res.ok) return null;
    const data = await res.json();
    if (!data.naam) return null;
    return {
      naam: data.naam,
      zone: data.zone,
      initials: data.naam.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase()
    };
  } catch(e) { return null; }
}
async function afvinkenFlow(id, naam) {
  try {
    const res = await fetch(FLOWS.TAAK_AFVINKEN, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ taak_id: String(id), medewerker: naam, status: 'Uitgevoerd' })
    });
    return res.ok || res.status === 204;
  } catch(e) { return false; }
}

// ── TOAST ──
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + (type || '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── INIT ──
laadTaken();
setInterval(laadTaken, 5 * 60 * 1000);
</script>
